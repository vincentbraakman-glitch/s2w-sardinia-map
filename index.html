<html lang="en" style="height:-webkit-fill-available;">

  body {

    background: #f5f0e8;
    color: #3a2e22;
    height: 100vh;
    height: 100dvh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .map-header {
    background: #1a2f3a;
    color: #f5f0e8;
    padding: 14px 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }
  .map-header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #f5f0e8;
  }
  .map-header .subtitle {
    font-size: 0.8rem;
    color: #c9bfa8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .map-wrapper {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 320px;
    min-width: 260px;
    background: #fffdf7;
    border-right: 1px solid #e5ddd0;
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9a8470;
    padding: 16px 20px 8px;
    border-bottom: 1px solid #f0ebe0;
  }

  .stop-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid #f0ebe0;
    transition: background 0.15s;
    position: relative;
  }
  .stop-item:hover { background: #fdf6ec; }
  .stop-item.active {
    background: #fdf6ec;
    border-left: 3px solid #c4892a;
  }

  .stop-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #c4892a;
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1.5px #c4892a;
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .excursion-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #5c7a5e;
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1.5px #5c7a5e;
    color: #fff;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .stop-content { flex: 1; min-width: 0; }
  .stop-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1rem;
    font-weight: 600;
    color: #2a1f14;
    line-height: 1.2;
  }
  .stop-highlight {
    font-size: 0.72rem;
    color: #c4892a;
    letter-spacing: 0.04em;
    margin-top: 2px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .stop-desc {
    font-size: 0.8rem;
    color: #6a5a4a;
    line-height: 1.5;
    margin-top: 6px;
    display: none;
  }
  .stop-item.active .stop-desc { display: block; }

  .excursion-section {
    border-top: 2px solid #e5ddd0;
    margin-top: auto;
  }

  #map {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #d4e3ee;
    z-index: 1;
  }

  .numbered-marker {
    background: #c4892a;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 2px #c4892a, 0 2px 8px rgba(0,0,0,0.35);
    border-radius: 50%;
    color: #ffffff;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .numbered-marker:hover,
  .numbered-marker.active {
    transform: scale(1.2);
    z-index: 1000 !important;
  }

  .excursion-marker {
    background: #5c7a5e;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 2px #5c7a5e, 0 2px 8px rgba(0,0,0,0.3);
    border-radius: 50%;
    color: #ffffff;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;

  .excursion-marker:hover,
  .excursion-marker.active {
    transform: scale(1.2);
    z-index: 1000 !important;
  }

    background: #fffdf7;
    border: 1px solid #e5ddd0;
    border-radius: 8px;

    padding: 16px 18px;

    font-size: 1.1rem;
    font-weight: 600;
    color: #2a1f14;
    margin-bottom: 4px;

    font-size: 0.7rem;
    color: #c4892a;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .popup-desc {
    font-size: 0.82rem;
    color: #5a4a3a;
    line-height: 1.55;
  }
  .leaflet-popup-tip { background: #fffdf7; }

    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 200;
    mix-blend-mode: multiply;
    background: rgba(244, 230, 200, 0.12);
  }

  .map-legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(255, 253, 247, 0.95);
    border: 1px solid #e5ddd0;
    border-radius: 8px;
    padding: 12px 16px;
    z-index: 500;
    font-size: 0.76rem;
    color: #5a4a3a;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #fff;
    flex-shrink: 0;
  }
  .legend-line {
    width: 20px;
    height: 3px;
    flex-shrink: 0;
    border-radius: 2px;
  }

  .drawer-handle { display: none; }

  @media (max-width: 640px) {
    body {
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;

      flex-direction: column;
      gap: 2px;

    .map-header h1 { font-size: 1.05rem; }
    .map-header .subtitle { font-size: 0.7rem; }

      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .sidebar {

      bottom: 0; left: 0; right: 0;
      width: 100%;
      min-width: unset;
      height: 52px;
      max-height: 62%;
      border-right: none;
      border-top: 1px solid #e5ddd0;
      border-bottom: none;
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -3px 20px rgba(0,0,0,0.13);
      z-index: 900;
      overflow: hidden;
      transition: height 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: unset;

    .sidebar.drawer-open {
      height: 62%;
      overflow-y: auto;
    }

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      height: 52px;
      flex-shrink: 0;
      cursor: pointer;
      background: #fffdf7;
      border-radius: 14px 14px 0 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .drawer-pill-wrap {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }
    .drawer-pill {
      width: 36px;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
    }
    .drawer-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #3a2e22;
      letter-spacing: 0.03em;
    }
    .drawer-arrow {
      font-size: 0.85rem;
      color: #9a8470;
      transition: transform 0.3s;
    }
    .drawer-open .drawer-arrow {
      transform: rotate(180deg);
    }

    .map-container-mobile {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    #map {
      position: absolute !important;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .map-legend {
      top: 10px;
      bottom: auto;
      right: 8px;
      padding: 8px 10px;
      font-size: 0.68rem;
    }

    .leaflet-popup-content {
      min-width: 180px;
      max-width: 220px;
    }
  }
</style>

  [41.2213, 9.4050], [41.2150, 9.4050], [41.2080, 9.4030], [41.2020, 9.3980],
  [41.1990, 9.3900], [41.1985, 9.3800], [41.1985, 9.3700], [41.2000, 9.3600],
  [41.2030, 9.3500], [41.2080, 9.3430], [41.2150, 9.3400], [41.2270, 9.3390],

  // Leg 9: Spargi → Caprera Bay (well south of all archipelago islands, then up east
  //   coast of Caprera. Stays at lat ≤ 41.185 to clear south coasts of Maddalena &
  //   Caprera, which sit at ~41.195. Approaches Cala Coticcio from south-east.)
  [41.2270, 9.3390], [41.2180, 9.3380], [41.2080, 9.3420], [41.1980, 9.3530],
  [41.1900, 9.3700], [41.1860, 9.3900], [41.1850, 9.4100], // south of Maddalena
  [41.1850, 9.4300], [41.1850, 9.4500], [41.1850, 9.4700], // south of Caprera
  [41.1880, 9.4880], [41.1940, 9.5000], [41.2020, 9.5050],
  [41.2100, 9.4980], [41.2150, 9.4870], [41.2150, 9.4767],

  // Leg 10: Caprera Bay → Porto Rotondo (south offshore along Sardinia east coast,
  //         well east of Costa Smeralda capes, into PR bay from north-east)
  [41.2150, 9.4767], [41.2080, 9.4800], [41.2000, 9.4900], [41.1900, 9.5050],
  [41.1780, 9.5200], [41.1650, 9.5350], [41.1500, 9.5500], [41.1350, 9.5650],
  [41.1200, 9.5750], [41.1050, 9.5800], [41.0900, 9.5820], [41.0750, 9.5800],
  [41.0600, 9.5750], [41.0480, 9.5680], [41.0380, 9.5600], [41.0300, 9.5550],
  [41.0264, 9.5478]
];

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', {
  zoomControl: true,
  scrollWheelZoom: true,
  attributionControl: false,
});
window.__map = map;  // debug hook

// Base layer — CARTO Voyager (clean, light)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// OpenSeaMap seamark overlay — buoys, depth contours, channels, harbour info
L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openseamap.org/">OpenSeaMap</a> contributors',
  maxZoom: 18,
  opacity: 0.9,
}).addTo(map);

const routeLine = L.polyline(ROUTE_COORDS, {
  color: '#c4892a',
  weight: 3,
  opacity: 0.85,
  smoothFactor: 1.5,
}).addTo(map);

// ── Mobile bottom drawer ──────────────────────────────────────────────────────
const drawerHandle = document.getElementById('drawerHandle');
const drawerArrow  = document.getElementById('drawerArrow');
const sidebarEl    = document.getElementById('sidebar');
let drawerOpen = false;

function setDrawer(open) {
  drawerOpen = open;
  sidebarEl.classList.toggle('drawer-open', open);
  drawerArrow.style.transform = open ? 'rotate(180deg)' : '';
}

drawerHandle.addEventListener('click', () => setDrawer(!drawerOpen));

function collapseDrawer() {
  if (window.innerWidth <= 640) setDrawer(false);
}

// ── Fit bounds ─────────────────────────────────────────────────────────────────
const allPoints = [
  ...STOPS.map(s => [s.lat, s.lon]),
  ...EXCURSIONS.map(e => [e.lat, e.lon]),
];

function fitMap() {
  map.invalidateSize(true);
  map.fitBounds(L.latLngBounds(allPoints), { padding: [40, 40] });
}

// Hash override: #lat,lon,zoom — used for debugging screenshots
function applyHashView() {
  const h = location.hash.slice(1);
  if (h && /^-?\d+(\.\d+)?,-?\d+(\.\d+)?,\d+$/.test(h)) {
    const [lat, lon, z] = h.split(',').map(Number);
    map.invalidateSize(true);
    map.setView([lat, lon], z, { animate: false });
    return true;
  }
  return false;
}

window.addEventListener('hashchange', () => applyHashView());
const hasHash = /^#-?\d+(\.\d+)?,-?\d+(\.\d+)?,\d+$/.test(location.hash);
if (hasHash) {
  // Defer until layout is stable
  requestAnimationFrame(() => requestAnimationFrame(() => {
    applyHashView();
    setTimeout(applyHashView, 300);
    setTimeout(applyHashView, 800);
  }));
} else {
  requestAnimationFrame(() => requestAnimationFrame(fitMap));
  setTimeout(fitMap, 300);
  setTimeout(fitMap, 800);
}

window.addEventListener('resize', fitMap);
window.addEventListener('orientationchange', () => setTimeout(fitMap, 400));

// ── State ──────────────────────────────────────────────────────────────────────
let activeStop = null;
let activeExcursion = null;
const markerMap = {};
const excursionMarkerMap = {};
const sidebarItemMap = {};
const sidebarExcursionMap = {};

function excursionEmoji(icon) {
  if (icon === 'food') return '🍴';
  if (icon === 'spa') return '♨';
  if (icon === 'castle') return '🏰';
  if (icon === 'wine') return '🍷';
  return '◆';
}

function createNumberedIcon(num, isActive) {
  return L.divIcon({
    className: '',
    html: `<div class="numbered-marker${isActive ? ' active' : ''}" style="width:36px;height:36px;">${num}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22],
  });
}

function createExcursionIcon(icon, isActive) {
  return L.divIcon({
    className: '',
    html: `<div class="excursion-marker${isActive ? ' active' : ''}" style="width:36px;height:36px;">${excursionEmoji(icon)}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22],
  });
}

function popupContent(item) {
  return `
    <div class="popup-name">${item.name}</div>
    <div class="popup-highlight">${item.highlight}</div>
    <div class="popup-desc">${item.desc}</div>
  `;
}

function activateStop(num) {
  if (activeStop !== null) {
    const prev = sidebarItemMap[activeStop];
    if (prev) prev.classList.remove('active');
    const prevMarker = markerMap[activeStop];
    if (prevMarker) prevMarker.setIcon(createNumberedIcon(activeStop, false));
  }
  if (activeExcursion !== null) {
    const prev = sidebarExcursionMap[activeExcursion];
    if (prev) prev.classList.remove('active');
    const prevMarker = excursionMarkerMap[activeExcursion];
    if (prevMarker) prevMarker.setIcon(createExcursionIcon(EXCURSIONS.find(e=>e.name===activeExcursion)?.icon, false));
    activeExcursion = null;
  }

  if (activeStop === num) { activeStop = null; return; }
  activeStop = num;
  const el = sidebarItemMap[num];
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  const marker = markerMap[num];
  if (marker) marker.setIcon(createNumberedIcon(num, true));
}

function activateExcursion(name) {
  if (activeStop !== null) {
    const prev = sidebarItemMap[activeStop];
    if (prev) prev.classList.remove('active');
    const prevMarker = markerMap[activeStop];
    if (prevMarker) prevMarker.setIcon(createNumberedIcon(activeStop, false));
    activeStop = null;
  }
  if (activeExcursion !== null) {
    const prev = sidebarExcursionMap[activeExcursion];
    if (prev) prev.classList.remove('active');
    const prevMarker = excursionMarkerMap[activeExcursion];
    if (prevMarker) prevMarker.setIcon(createExcursionIcon(EXCURSIONS.find(e=>e.name===activeExcursion)?.icon, false));
  }

  if (activeExcursion === name) { activeExcursion = null; return; }
  activeExcursion = name;
  const el = sidebarExcursionMap[name];
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  const excursion = EXCURSIONS.find(e => e.name === name);
  const marker = excursionMarkerMap[name];
  if (marker) marker.setIcon(createExcursionIcon(excursion?.icon, true));
}

const sidebar = document.getElementById('sidebar');
const excursionSection = sidebar.querySelector('.excursion-section');

STOPS.forEach(stop => {
  const item = document.createElement('div');
  item.className = 'stop-item';
  item.innerHTML = `
    <div class="stop-badge">${stop.num}</div>
    <div class="stop-content">
      <div class="stop-name">${stop.name}</div>
      <div class="stop-highlight">${stop.highlight}</div>
      <div class="stop-desc">${stop.desc}</div>
    </div>
  `;
  item.addEventListener('click', () => {
    activateStop(stop.num);
    map.setView([stop.lat, stop.lon], 12, { animate: true });
    markerMap[stop.num]?.openPopup();
    collapseDrawer();
  });
  sidebar.insertBefore(item, excursionSection);
  sidebarItemMap[stop.num] = item;

  const marker = L.marker([stop.lat, stop.lon], {
    icon: createNumberedIcon(stop.num, false),
    zIndexOffset: 200,
  }).addTo(map);
  marker.bindPopup(popupContent(stop), { maxWidth: 300 });
  marker.on('click', () => activateStop(stop.num));
  markerMap[stop.num] = marker;
});

EXCURSIONS.forEach(exc => {
  const item = document.createElement('div');
  item.className = 'stop-item';
  item.innerHTML = `
    <div class="excursion-badge">${excursionEmoji(exc.icon)}</div>
    <div class="stop-content">
      <div class="stop-name">${exc.name}</div>
      <div class="stop-highlight">${exc.highlight}</div>
      <div class="stop-desc">${exc.desc}</div>
    </div>
  `;
  item.addEventListener('click', () => {
    activateExcursion(exc.name);
    map.setView([exc.lat, exc.lon], 12, { animate: true });
    excursionMarkerMap[exc.name]?.openPopup();
    collapseDrawer();
  });
  excursionSection.appendChild(item);
  sidebarExcursionMap[exc.name] = item;

  const marker = L.marker([exc.lat, exc.lon], {
    icon: createExcursionIcon(exc.icon, false),
    zIndexOffset: 100,
  }).addTo(map);
  marker.bindPopup(popupContent(exc), { maxWidth: 300 });
  marker.on('click', () => activateExcursion(exc.name));
  excursionMarkerMap[exc.name] = marker;
});
</script>
</body>
</html>
