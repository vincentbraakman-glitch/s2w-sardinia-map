<!DOCTYPE html>
<html lang="en" style="height:-webkit-fill-available;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailing the Wild Coasts of Sardinia &amp; Corsica</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Mulish', system-ui, sans-serif;
    background: #fdf3f6;
    color: #444257;
    height: 100vh;
    height: 100dvh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .map-header {
    background: #343854;
    color: #fdf3f6;
    padding: 14px 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }
  .map-header h1 {
    font-family: 'Allura', 'Savoye LET', cursive;
    font-size: 2.3rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: #fdf3f6;
    line-height: 1;
  }
  .map-header .subtitle {
    font-size: 0.8rem;
    color: #bbb7b0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .map-wrapper {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 320px;
    min-width: 260px;
    background: #ffffff;
    border-right: 1px solid #ece7e1;
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9c9892;
    padding: 16px 20px 8px;
    border-bottom: 1px solid #ece7e1;
  }

  .stop-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid #ece7e1;
    transition: background 0.15s;
    position: relative;
  }
  .stop-item:hover { background: #f9f4ee; }
  .stop-item.active {
    background: #f9f4ee;
    border-left: 3px solid #75716b;
  }

  .stop-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #75716b;
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1.5px #75716b;
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .excursion-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #6a6f8f;
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1.5px #6a6f8f;
    color: #fff;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .stop-content { flex: 1; min-width: 0; }
  .stop-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1rem;
    font-weight: 600;
    color: #1c1f39;
    line-height: 1.2;
  }
  .stop-highlight {
    font-size: 0.72rem;
    color: #75716b;
    letter-spacing: 0.04em;
    margin-top: 2px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .stop-desc {
    font-size: 0.8rem;
    color: #75716b;
    line-height: 1.5;
    margin-top: 6px;
    display: none;
  }
  .stop-item.active .stop-desc { display: block; }

  .excursion-section {
    border-top: 2px solid #ece7e1;
    margin-top: auto;
  }

  #map {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #d4e3ee;
    z-index: 1;
  }

  .numbered-marker {
    background: #75716b;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 2px #75716b, 0 2px 8px rgba(0,0,0,0.35);
    border-radius: 50%;
    color: #ffffff;
    font-family: 'Mulish', sans-serif;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .numbered-marker:hover,
  .numbered-marker.active {
    transform: scale(1.2);
    z-index: 1000 !important;
  }

  .excursion-marker {
    background: #6a6f8f;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 2px #6a6f8f, 0 2px 8px rgba(0,0,0,0.3);
    border-radius: 50%;
    color: #ffffff;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .excursion-marker:hover,
  .excursion-marker.active {
    transform: scale(1.2);
    z-index: 1000 !important;
  }

  .leaflet-popup-content-wrapper {
    background: #ffffff;
    border: 1px solid #ece7e1;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    padding: 0;
  }
  .leaflet-popup-content {
    margin: 0;
    padding: 16px 18px;
    min-width: 220px;
    max-width: 280px;
  }
  .popup-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: #1c1f39;
    margin-bottom: 4px;
  }
  .popup-highlight {
    font-size: 0.7rem;
    color: #75716b;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .popup-desc {
    font-size: 0.82rem;
    color: #58554f;
    line-height: 1.55;
  }
  .leaflet-popup-tip { background: #ffffff; }

  .map-tint {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 200;
    mix-blend-mode: multiply;
    background: rgba(244, 230, 200, 0.12);
  }

  .map-legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(255, 253, 247, 0.95);
    border: 1px solid #ece7e1;
    border-radius: 8px;
    padding: 12px 16px;
    z-index: 500;
    font-size: 0.76rem;
    color: #58554f;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #fff;
    flex-shrink: 0;
  }
  .legend-line {
    width: 20px;
    height: 3px;
    flex-shrink: 0;
    border-radius: 2px;
  }

  .drawer-handle { display: none; }

  @media (max-width: 640px) {
    body {
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
    }

    .map-header {
      padding: 8px 16px;
      flex-direction: column;
      gap: 2px;
    }
    .map-header h1 { font-size: 1.75rem; }
    .map-header .subtitle { font-size: 0.7rem; }

    .map-wrapper {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .sidebar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      min-width: unset;
      height: 52px;
      max-height: 62%;
      border-right: none;
      border-top: 1px solid #ece7e1;
      border-bottom: none;
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -3px 20px rgba(0,0,0,0.13);
      z-index: 900;
      overflow: hidden;
      transition: height 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: unset;
    }
    .sidebar.drawer-open {
      height: 62%;
      overflow-y: auto;
    }

    .drawer-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      height: 52px;
      flex-shrink: 0;
      cursor: pointer;
      background: #ffffff;
      border-radius: 14px 14px 0 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .drawer-pill-wrap {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }
    .drawer-pill {
      width: 36px;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
    }
    .drawer-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #444257;
      letter-spacing: 0.03em;
    }
    .drawer-arrow {
      font-size: 0.85rem;
      color: #9c9892;
      transition: transform 0.3s;
    }
    .drawer-open .drawer-arrow {
      transform: rotate(180deg);
    }

    .map-container-mobile {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    #map {
      position: absolute !important;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .map-legend {
      top: 10px;
      bottom: auto;
      right: 8px;
      padding: 8px 10px;
      font-size: 0.68rem;
    }

    .leaflet-popup-content {
      min-width: 180px;
      max-width: 220px;
    }
  }
</style>
</head>

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', {
  zoomControl: true,
  scrollWheelZoom: true,
  attributionControl: false,
});
window.__map = map;  // debug hook

// Base layer — CARTO Voyager (clean, light)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

const routeLine = L.polyline(ROUTE_COORDS, {
  color: '#75716b',
  weight: 3,
  opacity: 0.85,
  smoothFactor: 1.5,
}).addTo(map);

// ── Mobile bottom drawer ──────────────────────────────────────────────────────
const drawerHandle = document.getElementById('drawerHandle');
const drawerArrow  = document.getElementById('drawerArrow');
const sidebarEl    = document.getElementById('sidebar');
let drawerOpen = false;

function setDrawer(open) {
  drawerOpen = open;
  sidebarEl.classList.toggle('drawer-open', open);
  drawerArrow.style.transform = open ? 'rotate(180deg)' : '';
}

drawerHandle.addEventListener('click', () => setDrawer(!drawerOpen));

function collapseDrawer() {
  if (window.innerWidth <= 640) setDrawer(false);
}

// ── Fit bounds ─────────────────────────────────────────────────────────────────
const allPoints = [
  ...STOPS.map(s => [s.lat, s.lon]),
  ...EXCURSIONS.map(e => [e.lat, e.lon]),
];

function fitMap() {
  map.invalidateSize(true);
  map.fitBounds(L.latLngBounds(allPoints), { padding: [40, 40] });
}

// Hash override: #lat,lon,zoom — used for debugging screenshots
function applyHashView() {
  const h = location.hash.slice(1);
  if (h && /^-?\d+(\.\d+)?,-?\d+(\.\d+)?,\d+$/.test(h)) {
    const [lat, lon, z] = h.split(',').map(Number);
    map.invalidateSize(true);
    map.setView([lat, lon], z, { animate: false });
    return true;
  }
  return false;
}

window.addEventListener('hashchange', () => applyHashView());
const hasHash = /^#-?\d+(\.\d+)?,-?\d+(\.\d+)?,\d+$/.test(location.hash);
if (hasHash) {
  // Defer until layout is stable
  requestAnimationFrame(() => requestAnimationFrame(() => {
    applyHashView();
    setTimeout(applyHashView, 300);
    setTimeout(applyHashView, 800);
  }));
} else {
  requestAnimationFrame(() => requestAnimationFrame(fitMap));
  setTimeout(fitMap, 300);
  setTimeout(fitMap, 800);
}

window.addEventListener('resize', fitMap);
window.addEventListener('orientationchange', () => setTimeout(fitMap, 400));

// ── State ──────────────────────────────────────────────────────────────────────
let activeStop = null;
let activeExcursion = null;
const markerMap = {};
const excursionMarkerMap = {};
const sidebarItemMap = {};
const sidebarExcursionMap = {};

function excursionEmoji(icon) {
  if (icon === 'food') return '🍴';
  if (icon === 'spa') return '♨';
  if (icon === 'castle') return '🏰';
  if (icon === 'wine') return '🍷';
  if (icon === 'grapes') return '🍇';
  return '◆';
}

function createNumberedIcon(num, isActive) {
  return L.divIcon({
    className: '',
    html: `<div class="numbered-marker${isActive ? ' active' : ''}" style="width:36px;height:36px;">${num}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22],
  });
}

function createExcursionIcon(icon, isActive) {
  return L.divIcon({
    className: '',
    html: `<div class="excursion-marker${isActive ? ' active' : ''}" style="width:36px;height:36px;">${excursionEmoji(icon)}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22],
  });
}

function popupContent(item) {
  return `
    <div class="popup-name">${item.name}</div>
    <div class="popup-highlight">${item.highlight}</div>
    <div class="popup-desc">${item.desc}</div>
  `;
}

function activateStop(num) {
  if (activeStop !== null) {
    const prev = sidebarItemMap[activeStop];
    if (prev) prev.classList.remove('active');
    const prevMarker = markerMap[activeStop];
    if (prevMarker) prevMarker.setIcon(createNumberedIcon(activeStop, false));
  }
  if (activeExcursion !== null) {
    const prev = sidebarExcursionMap[activeExcursion];
    if (prev) prev.classList.remove('active');
    const prevMarker = excursionMarkerMap[activeExcursion];
    if (prevMarker) prevMarker.setIcon(createExcursionIcon(EXCURSIONS.find(e=>e.name===activeExcursion)?.icon, false));
    activeExcursion = null;
  }

  if (activeStop === num) { activeStop = null; return; }
  activeStop = num;
  const el = sidebarItemMap[num];
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  const marker = markerMap[num];
  if (marker) marker.setIcon(createNumberedIcon(num, true));
}

function activateExcursion(name) {
  if (activeStop !== null) {
    const prev = sidebarItemMap[activeStop];
    if (prev) prev.classList.remove('active');
    const prevMarker = markerMap[activeStop];
    if (prevMarker) prevMarker.setIcon(createNumberedIcon(activeStop, false));
    activeStop = null;
  }
  if (activeExcursion !== null) {
    const prev = sidebarExcursionMap[activeExcursion];
    if (prev) prev.classList.remove('active');
    const prevMarker = excursionMarkerMap[activeExcursion];
    if (prevMarker) prevMarker.setIcon(createExcursionIcon(EXCURSIONS.find(e=>e.name===activeExcursion)?.icon, false));
  }

  if (activeExcursion === name) { activeExcursion = null; return; }
  activeExcursion = name;
  const el = sidebarExcursionMap[name];
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  const excursion = EXCURSIONS.find(e => e.name === name);
  const marker = excursionMarkerMap[name];
  if (marker) marker.setIcon(createExcursionIcon(excursion?.icon, true));
}

const sidebar = document.getElementById('sidebar');
const excursionSection = sidebar.querySelector('.excursion-section');

STOPS.forEach(stop => {
  const item = document.createElement('div');
  item.className = 'stop-item';
  item.innerHTML = `
    <div class="stop-badge">${stop.num}</div>
    <div class="stop-content">
      <div class="stop-name">${stop.name}</div>
      <div class="stop-highlight">${stop.highlight}</div>
      <div class="stop-desc">${stop.desc}</div>
    </div>
  `;
  item.addEventListener('click', () => {
    activateStop(stop.num);
    map.setView([stop.lat, stop.lon], 12, { animate: true });
    markerMap[stop.num]?.openPopup();
    collapseDrawer();
  });
  sidebar.insertBefore(item, excursionSection);
  sidebarItemMap[stop.num] = item;

  const marker = L.marker([stop.lat, stop.lon], {
    icon: createNumberedIcon(stop.num, false),
    zIndexOffset: 200,
  }).addTo(map);
  marker.bindPopup(popupContent(stop), { maxWidth: 300 });
  marker.on('click', () => activateStop(stop.num));
  markerMap[stop.num] = marker;
});

EXCURSIONS.forEach(exc => {
  const item = document.createElement('div');
  item.className = 'stop-item';
  item.innerHTML = `
    <div class="excursion-badge">${excursionEmoji(exc.icon)}</div>
    <div class="stop-content">
      <div class="stop-name">${exc.name}</div>
      <div class="stop-highlight">${exc.highlight}</div>
      <div class="stop-desc">${exc.desc}</div>
    </div>
  `;
  item.addEventListener('click', () => {
    activateExcursion(exc.name);
    map.setView([exc.lat, exc.lon], 12, { animate: true });
    excursionMarkerMap[exc.name]?.openPopup();
    collapseDrawer();
  });
  excursionSection.appendChild(item);
  sidebarExcursionMap[exc.name] = item;

  const marker = L.marker([exc.lat, exc.lon], {
    icon: createExcursionIcon(exc.icon, false),
    zIndexOffset: 100,
  }).addTo(map);
  marker.bindPopup(popupContent(exc), { maxWidth: 300 });
  marker.on('click', () => activateExcursion(exc.name));
  excursionMarkerMap[exc.name] = marker;
});
</script>
